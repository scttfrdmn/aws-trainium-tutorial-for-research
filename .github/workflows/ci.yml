name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format (ruff) + types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        # uv venv + uv pip avoids the system (PEP-668 externally-managed) Python; `uv run` then
        # executes tools inside that venv.
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (scripts)
        run: uv run mypy scripts/ --ignore-missing-imports
        continue-on-error: true  # type coverage is a work in progress; do not block CI yet

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This repo standardizes on a single Python version (3.12, pinned in .python-version).
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package + dev/science deps
        # Neuron wheels are not on PyPI and require Neuron hardware, so they are not installed
        # in CI. Tests that need them are marked `neuron` and deselected below.
        run: |
          uv venv
          uv pip install -e ".[dev,science]"

      - name: Run tests (no AWS / no Neuron hardware)
        run: uv run pytest -m "not aws and not neuron" --cov-report=xml

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Build sdist + wheel
        run: uv build
